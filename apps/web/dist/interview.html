<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nemuri | Interview</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-wrap">
      <section class="interview-layout">
        <aside class="panel">
          <span class="eyebrow">Interview page</span>
          <h2>Entrevista inicial</h2>
          <p>Esta pantalla es solo para nuevos usuarios. Al terminar, pasan al dashboard principal.</p>
          <div class="progress-shell"><div class="progress-bar" style="width:50%"></div></div>
          <small>Paso 2 de 4</small>
        </aside>
        <article class="panel">
          <span class="eyebrow">Pregunta actual</span>
          <h2 id="question-title">Edad del bebe</h2>
          <p id="question-helper">Esto ajusta ventanas de sueno y expectativas para su etapa.</p>
          <div class="answer-list" id="answer-grid">
          </div>
          <div class="footer-actions">
            <a class="secondary" href="/signup.html">Volver</a>
            <button class="primary" id="next-question" type="button">Siguiente</button>
          </div>
        </article>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
  </html>
